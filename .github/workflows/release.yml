name: Release

# Publishes the @riseaicloud/* design-system packages to GitHub Packages.
#
# Pre-1.0.0 (current): MANUAL only. Go to Actions → Release → "Run workflow"
# when the design system is ready to ship. `changeset publish` pushes any
# package whose version is not yet on the registry (the fixed group is at
# 1.0.0). Merging a PR never publishes on its own.
#
# Post-1.0.0: uncomment the `push` trigger and the `changesets/action` step,
# and drop the manual publish step. Every merge to main that carries
# changesets then opens a "Version Packages" PR; merging that PR publishes.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "./packages/*" build

      - name: Publish to GitHub Packages
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Automated flow (enable post-1.0.0; remove the manual step above) ──
      # - name: Create Release PR or publish
      #   uses: changesets/action@v1
      #   with:
      #     version: pnpm changeset version
      #     publish: pnpm changeset publish
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
